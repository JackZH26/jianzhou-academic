<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Main body -->
  <rect x="60" y="20" width="80" height="20" rx="4" fill="#b8c9d9" stroke="#8a9bab" stroke-width="1"/>
  <!-- Solar panels left -->
  <rect x="5" y="8" width="50" height="44" rx="2" fill="#3b6fa0" stroke="#2d5580" stroke-width="1" opacity="0.8"/>
  <line x1="5" y1="30" x2="55" y2="30" stroke="#2d5580" stroke-width="0.5"/>
  <line x1="30" y1="8" x2="30" y2="52" stroke="#2d5580" stroke-width="0.5"/>
  <!-- Solar panels right -->
  <rect x="145" y="8" width="50" height="44" rx="2" fill="#3b6fa0" stroke="#2d5580" stroke-width="1" opacity="0.8"/>
  <line x1="145" y1="30" x2="195" y2="30" stroke="#2d5580" stroke-width="0.5"/>
  <line x1="170" y1="8" x2="170" y2="52" stroke="#2d5580" stroke-width="0.5"/>
  <!-- Connecting truss -->
  <rect x="55" y="27" width="8" height="6" fill="#9aabb8"/>
  <rect x="137" y="27" width="8" height="6" fill="#9aabb8"/>
  <!-- Docking port -->
  <circle cx="100" cy="18" r="4" fill="#c0c8d0" stroke="#8a9bab" stroke-width="0.5"/>
  <!-- Module details -->
  <rect x="75" y="22" width="12" height="4" rx="1" fill="#a0b0c0"/>
  <rect x="113" y="22" width="12" height="4" rx="1" fill="#a0b0c0"/>
  <rect x="90" y="34" width="20" height="4" rx="1" fill="#a0b0c0"/>
</svg>
