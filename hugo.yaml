        content: |
          Strong log-concavity of the Riemann-Jacobi kernel: (log Φ)″(u) ≤ −67.65, quantitative Turán inequalities, and Weil positivity evidence across 168 primes.
        links:
          - icon: fas fa-external-link-alt
