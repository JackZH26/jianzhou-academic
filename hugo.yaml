    image: "/images/profile.jpg"
    content: |
      I am an independent researcher based in Shanghai, China. My primary research interests lie at the intersection of **number theory**, **mathematical physics**, and **condensed matter theory**.

      I work as a Product Director and Game Producer at XD.INC, a Hong Kong-listed gaming company, while pursuing fundamental physics research independently. From 2017 to 2020, I lived in Berlin, Germany, where my second child — named Feiman after Richard Feynman — was born.

      My research is driven by a simple question that Feynman himself called "one of the greatest damn mysteries of physics": **can the fine-structure constant α admit an elegant and exact mathematical expression?**
