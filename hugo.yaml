baseURL: "https://jackzh26.github.io/jianzhou-academic/"
title: "Jian Zhou"
theme: "PaperMod"
languageCode: en
hasCJKLanguage: true

params:
  env: production
  description: "Independent Researcher in Mathematical Physics, Number Theory, and Superconductivity"
  author: "Jian Zhou"
  
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  
  profileMode:
    enabled: true
    title: "Jian Zhou (周健)"
    subtitle: |
      Independent Researcher · Mathematical Physics · Number Theory · Superconductivity
      
      By day, Product Director in the gaming industry. By night, exploring the deepest mysteries of physics — from the fine-structure constant to the Riemann Hypothesis.
      
      Former Berlin resident (2017–2020). My son Feiman was born there, named after Richard Feynman.
    imageUrl: "/images/profile.jpg"
    imageWidth: 200
    imageHeight: 200
    imageTitle: "Jian Zhou"
    buttons:
      - name: Publications
        url: /publications/
      - name: Research
        url: /research/
      - name: About
        url: /about/

  socialIcons:
    - name: email
      url: "mailto:jackzhou.sci@gmail.com"
    - name: github
      url: "https://github.com/JackZH26"
    - name: orcid
      url: "https://orcid.org/0009-0000-3536-9500"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - name: Home
      url: /
      weight: 1
    - name: Research
      url: /research/
      weight: 2
    - name: Publications
      url: /publications/
      weight: 3
    - name: About
      url: /about/
      weight: 4
    - name: Search
      url: /search/
      weight: 5

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
